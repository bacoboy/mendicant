<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Passkey – Mendicant</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 10vh auto; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .info { background: #f0f0f0; padding: 1rem; border-radius: 4px; margin-bottom: 1.5rem; font-size: .9rem; }
    button { width: 100%; padding: .65rem; font-size: 1rem; background: #0070f3;
             color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0051a2; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #c00; font-size: .9rem; margin-top: .5rem; }
  </style>
</head>
<body>
  <h1>Register your passkey</h1>

  <div data-signals='{"token":"","registerOptions":null,"challengeId":"","registerError":""}'>
    <div class="info">
      Email verified! Now register a passkey to complete your account setup.
    </div>

    <div data-show="$registerError !== ''" class="error" data-text="$registerError"></div>

    <button type="button" data-on-click="passkeyRegisterWithToken">Register Passkey</button>
  </div>

  <script type="module">
    import('/static/datastar.js').then(ds => {
      window.Datastar = ds;
      window.root = ds.root;

      // Extract token from URL
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token') || '';
      window.root.setSignals({token});

      console.log('[register-confirm] Datastar loaded, token:', token);
    }).catch(e => console.error('Failed to load Datastar:', e));
  </script>
  <script type="module" src="/static/passkey-plugin.js"></script>
</body>
</html>
