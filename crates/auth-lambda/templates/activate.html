<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate CLI – Mendicant</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 10vh auto; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: .5rem; }
    p  { color: #555; margin-bottom: 1.25rem; }
    label { display: block; margin-bottom: .25rem; font-size: .9rem; color: #555; }
    input { width: 100%; box-sizing: border-box; padding: .5rem; font-size: 1.4rem;
            letter-spacing: .15em; text-align: center; text-transform: uppercase;
            border: 1px solid #ccc; border-radius: 4px; margin-bottom: 1rem; }
    button { width: 100%; padding: .65rem; font-size: 1rem; background: #0070f3;
             color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0051a2; }
    .error { color: #c00; font-size: .9rem; margin-top: .5rem; }
    #activate-status { margin-top: 1rem; font-weight: 600; color: #040; }
  </style>
</head>
<body>
  <h1>Activate CLI access</h1>
  <p>Enter the 8-character code shown in your terminal.</p>

  <div data-signals='{
    "userCode": "{{ prefill_code }}",
    "activateError": ""
  }'>
    <div data-show="$activateError !== ''" class="error" data-text="$activateError"></div>

    <label for="user-code">Device code</label>
    <input id="user-code" type="text" data-bind="userCode"
           placeholder="XXXX-XXXX" maxlength="9" autocomplete="off">

    <button type="button"
            data-on-click="$$post('/activate', {contentType: 'application/json', body: JSON.stringify({user_code: $userCode})})">
      Activate
    </button>

    <div id="activate-status"></div>
  </div>

  <script type="module">
    import('/static/datastar.js').then(ds => {
      window.Datastar = ds;
    }).catch(e => console.error('Failed to load Datastar:', e));
  </script>
  <script type="module" src="/static/passkey-plugin.js"></script>
</body>
</html>
