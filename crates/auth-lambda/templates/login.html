{% extends "base.html" %}

{% block title %}sign in – mendicant{% endblock %}

{% block nav_right %}
  <a href="/register">register</a>
{% endblock %}

{% block page_class %}page-slim{% endblock %}

{% block content %}
  <h1>sign in</h1>

  <div data-signals='{"loginOptions":null,"challengeId":"","loginError":""}'>
    <div data-show="$loginError !== ''" class="error" data-text="$loginError"></div>

    <button type="button" class="btn btn-primary full-width"
            data-on-click="@passkeyLogin()" style="margin-top:1rem;">
      sign in with passkey
    </button>

  </div>
{% endblock %}

{% block scripts %}
  <script type="module">
    import('/static/datastar.js').then(ds => {
      window.Datastar = ds;
      window.root = ds.root;
    }).catch(e => console.error('Failed to load Datastar:', e));
  </script>
  <script type="module" src="/static/passkey-plugin.js"></script>
{% endblock %}
