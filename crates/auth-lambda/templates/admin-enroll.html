<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Enrollment – Mendicant</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 10vh auto; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    .subtitle { color: #666; font-size: .9rem; margin-top: 0; margin-bottom: 1.5rem; }
    .notice {
      background: #fff8e1; border-left: 4px solid #f59e0b;
      padding: .85rem 1rem; border-radius: 4px; margin-bottom: 1.5rem;
      font-size: .9rem; line-height: 1.5;
    }
    button {
      width: 100%; padding: .65rem; font-size: 1rem;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #333; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #c00; font-size: .9rem; margin-top: .75rem; }
  </style>
</head>
<body>
  <h1>Admin Enrollment</h1>
  <p class="subtitle">Register your YubiKey as an administrator credential.</p>

  <script type="module">
    // Extract token from URL before Datastar loads.
    const params = new URLSearchParams(window.location.search);
    window.__enrollToken = params.get('token') || '';
  </script>

  <div data-signals='{"registerOptions":null,"challengeId":"","enrollError":""}'>
    <div class="notice">
      Insert your YubiKey, then click <strong>Register YubiKey</strong>.<br>
      You will be prompted to touch it. This link is single-use.
    </div>

    <button type="button" id="enroll-btn">Register YubiKey</button>

    <div data-show="$enrollError !== ''" class="error" data-text="$enrollError"></div>
  </div>

  <script type="module">
    import('/static/datastar.js').then(ds => {
      window.Datastar = ds;
      window.root = ds.root;
      if (window.__enrollToken) {
        window.root.enrollToken = window.__enrollToken;
      }
    }).catch(e => console.error('[admin-enroll] Failed to load Datastar:', e));
  </script>
  <script type="module" src="/static/passkey-plugin.js"></script>
</body>
</html>
