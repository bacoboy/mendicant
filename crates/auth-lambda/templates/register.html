{% extends "base.html" %}

{% block title %}create account – mendicant{% endblock %}

{% block nav_right %}
  <a href="/login">sign in</a>
{% endblock %}

{% block page_class %}page-slim{% endblock %}

{% block content %}
  <h1>create account</h1>

  <div data-signals='{"email":"","inviteCode":"","emailError":""}'>
    <div data-show="$emailError !== ''" class="error" data-text="$emailError"></div>

    <label for="email">email address</label>
    <input id="email" type="email" data-bind="email"
           placeholder="you@example.com" autocomplete="username">

    <label for="inviteCode">invite code</label>
    <input id="inviteCode" type="text" data-bind="inviteCode"
           placeholder="enter your invite code">

    <button type="button" class="btn btn-primary full-width"
            data-on-click="registerEmail">continue</button>

  </div>
{% endblock %}

{% block scripts %}
  <script type="module">
    import('/static/datastar.js').then(ds => {
      window.Datastar = ds;
      window.root = ds.root;
    }).catch(e => console.error('Failed to load Datastar:', e));
  </script>
  <script type="module" src="/static/passkey-plugin.js"></script>
{% endblock %}
