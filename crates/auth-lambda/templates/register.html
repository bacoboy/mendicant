<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Mendicant</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 10vh auto; padding: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: .25rem; font-size: .9rem; color: #555; }
    input { width: 100%; box-sizing: border-box; padding: .5rem; font-size: 1rem;
            border: 1px solid #ccc; border-radius: 4px; margin-bottom: 1rem; }
    button { width: 100%; padding: .65rem; font-size: 1rem; background: #0070f3;
             color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0051a2; }
    .error { color: #c00; font-size: .9rem; margin-top: .5rem; }
    .switch { margin-top: 1.25rem; font-size: .9rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Create your account</h1>

  <div data-signals='{"email":"","displayName":"","registerOptions":null,"challengeId":"","registerError":""}'>
    <div data-show="$registerError !== ''" class="error" data-text="$registerError"></div>

    <label for="email">Email</label>
    <input id="email" type="email" data-bind="email" placeholder="you@example.com" autocomplete="username webauthn">

    <label for="display-name">Display name</label>
    <input id="display-name" type="text" data-bind="displayName" placeholder="Alice" autocomplete="name">

    <button type="button" data-on-click="@passkeyRegister($email, $displayName)">Register with Passkey</button>

    <p class="switch">Already have an account? <a href="/">Sign in</a></p>
  </div>

  <script type="module">
    import('/static/datastar.js').then(ds => {
      window.Datastar = ds;
      window.root = ds.root;
      console.log('[register] Datastar loaded, window.root:', window.root);
    }).catch(e => console.error('Failed to load Datastar:', e));
  </script>
  <script type="module" src="/static/passkey-plugin.js"></script>
</body>
</html>
