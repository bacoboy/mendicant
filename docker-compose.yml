services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: mendicant-dynamodb
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  # ── auth-lambda ──────────────────────────────────────────────────────────────
  # Establishes JWTs (login, register, refresh, recover, oauth, enroll) plus
  # public HTML pages and static assets.
  auth-lambda:
    build:
      context: .
      dockerfile: crates/auth-lambda/Dockerfile
    volumes:
      - ./dev-key.pem:/var/task/dev-key.pem
    environment:
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      JWT_SIGNING_KEY_PATH: /var/task/dev-key.pem
      RP_ORIGIN: https://localhost:9001
      RP_ID: localhost
      TABLE_USERS: users
      TABLE_CREDENTIALS: credentials
      TABLE_REFRESH_TOKENS: refresh_tokens
      TABLE_CHALLENGES: challenges
      TABLE_EMAIL_TOKENS: email_tokens
      TABLE_OAUTH_DEVICES: oauth_devices
      ENVIRONMENT: dev
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-2
      NO_PROXY: dynamodb-local
      no_proxy: dynamodb-local
    depends_on:
      - dynamodb-local

  # ── user-lambda ──────────────────────────────────────────────────────────────
  # Operates on the authenticated user (/me/* and PATCH /admin/users/{id}).
  # Does not sign JWTs — only verifies them via the shared decoding key.
  user-lambda:
    build:
      context: .
      dockerfile: crates/user-lambda/Dockerfile
    volumes:
      - ./dev-key.pem:/var/task/dev-key.pem
    environment:
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      JWT_SIGNING_KEY_PATH: /var/task/dev-key.pem
      RP_ORIGIN: https://localhost:9001
      RP_ID: localhost
      TABLE_USERS: users
      TABLE_CREDENTIALS: credentials
      TABLE_REFRESH_TOKENS: refresh_tokens
      TABLE_CHALLENGES: challenges
      TABLE_EMAIL_TOKENS: email_tokens
      TABLE_OAUTH_DEVICES: oauth_devices
      ENVIRONMENT: dev
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-2
      NO_PROXY: dynamodb-local
      no_proxy: dynamodb-local
    depends_on:
      - dynamodb-local

  # Translates HTTP requests into API Gateway v2 events and invokes a Lambda RIE.
  # One gateway per lambda — Caddy routes incoming paths to the right one.
  auth-apigw:
    build:
      context: tools/local-apigw
    environment:
      LAMBDA_ENDPOINT: http://auth-lambda:8080/2015-03-31/functions/function/invocations
      RUST_LOG: local_apigw=info
      NO_PROXY: auth-lambda
      no_proxy: auth-lambda
    depends_on:
      - auth-lambda

  user-apigw:
    build:
      context: tools/local-apigw
    environment:
      LAMBDA_ENDPOINT: http://user-lambda:8080/2015-03-31/functions/function/invocations
      RUST_LOG: local_apigw=info
      NO_PROXY: user-lambda
      no_proxy: user-lambda
    depends_on:
      - user-lambda

  # HTTPS reverse proxy. Required for Safari WebAuthn (navigator.credentials needs HTTPS).
  # Path-routes /me/* to user-apigw and everything else to auth-apigw.
  # Accept the browser cert warning on first use, or run: docker compose exec caddy caddy trust
  caddy:
    image: caddy:alpine
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./crates/auth-lambda/static:/srv/static
      - caddy_data:/data
      - caddy_config:/config
    environment:
      NO_PROXY: auth-apigw,user-apigw
      no_proxy: auth-apigw,user-apigw
    depends_on:
      - auth-apigw
      - user-apigw

volumes:
  caddy_data:
  caddy_config:
